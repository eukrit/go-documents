# cloudbuild.yaml
# GO Documents — GCP Cloud Build Pipeline
# Service: go-documents (docs.leka.studio)
# Triggers: push to main → build + deploy to Cloud Run

substitutions:
  _SERVICE: go-documents
  _REGION: asia-southeast1
  _REPO: asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '-t'
      - '$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REPO/$_SERVICE:latest'
      - '.'

  # Step 2: Push image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', '--all-tags', '$_REPO/$_SERVICE']

  # Step 3: Deploy to Cloud Run (main branch only)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          gcloud run deploy $_SERVICE \
            --image $_REPO/$_SERVICE:$SHORT_SHA \
            --region $_REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=claude@$PROJECT_ID.iam.gserviceaccount.com \
            --min-instances=0 \
            --max-instances=3 \
            --memory=1Gi \
            --cpu=1 \
            --set-env-vars=GCP_PROJECT=$PROJECT_ID,SUBMISSION_SENDER=eukrit@goco.bz,SUBMISSION_EVENTS_TOPIC=submission-events,SUBMISSIONS_DRIVE_FOLDER_ID=1gAhGAI94Z96aFUm3nCp66QO573ixm-Vh,SLACK_SIGNING_SECRET_NAME=slack-signing-secret,SUBMISSION_RESPONSE_DAYS=7
          echo "Deployed $_SERVICE:$SHORT_SHA to Cloud Run"
        else
          echo "Branch $BRANCH_NAME: skipping deploy (build only)"
        fi

images:
  - '$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REPO/$_SERVICE:latest'

tags:
  - '$_SERVICE'
  - '$BRANCH_NAME'
